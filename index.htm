<!DOCTYPE html>
<html><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="user-scalable=no, width=device-width, height=device-height, initial-scale=1.0, minimum-scale=1, maximum-scale=1">

<title>开心斗地主</title>

<style>
body
{
	padding: 0;
	margin: 0;	
	height: 100%;
	background-color: #eee;
	font-size: 12px;

	-webkit-touch-callout: none;
	-webkit-user-select: none;
	-webkit-tap-highlight-color: rgba(0,0,0,0);
	-webkit-text-size-adjust: none;
}

#main
{
	margin: 0 auto;
	width: 100%;
	max-width: 1008px;
}

#textContainer
{
	margin: 0 auto;
	font: 24px arial, verdana;
	font-weight: bold;
	color: #333;
	position: absolute;
	top: 200px;
	left: 50%;
	transform: translateX(-50%);
	text-align: center;
    text-shadow: 0 2px 2px #ccc;
}

canvas {
    display: block;
    margin: 0 auto;
    max-width: 100%;
    height: auto;
}

</style>

<script type="text/javascript" src="casual-0.1.min.js"></script>
<script type="text/javascript" src="ddz.min.js"></script>

<script type="text/javascript">
// 确保 ddz 对象存在
if (typeof ddz === 'undefined') {
    var ddz = {};
}

function startGame()
{
	if (!document.createElement('canvas').getContext)
	{
		alert("Sorry, your browser doesn't support canvas, please use Firefox3.6+, Safari5+, Chrome, IE9+ etc.");
		return;
	}
	
	var bw = window.innerWidth || document.body.offsetWidth;
	var bh = window.innerHeight || document.body.offsetHeight;
	var canvas = document.getElementById("canvas");
	
	if(canvas.height < bh) canvas.style.marginTop = (bh - canvas.height >> 1) + "px";
	
	playAudio();
    
    // 检查 ddz.startup 是否存在
    if (typeof ddz !== 'undefined' && typeof ddz.startup === 'function') {
        ddz.startup();
    } else {
        console.error("ddz.startup is not defined. Resources might still be loading.");
        setTimeout(startGame, 500); // 重试
    }
}


function playAudio()
{
	var audioObj = document.getElementById("myAudioObj");
    if (!audioObj) {
        audioObj = new Audio("bg.mp3");
        audioObj.loop = true;
        audioObj.id = "myAudioObj";
        document.body.appendChild(audioObj);
    }
	var playPromise = audioObj.play();
	if (playPromise !== undefined) {
		playPromise.catch(error => {
			console.log("Autoplay prevented, waiting for user interaction.");
			document.addEventListener('click', () => {
				audioObj.play();
			}, {once: true});
		});
	}
}
</script>

</head>

<body onload="startGame();">	
	<div id="main">
		<div id="canvasContainer">
			<canvas id="canvas" width="1000" height="640" style="background-image: url(bg.png); background-size: cover; background-position: 50% 50%;">Sorry, your browser doesn't support canvas, please use Firefox3.6+, Safari5+, Chrome, IE9+ etc.</canvas>
		</div>  
		<div id="textContainer">
			<span id="status"></span>
		</div>
	</div>	

<audio preload="auto" src="bg.mp3" loop="" id="myAudioObj"></audio>
</body></html>
